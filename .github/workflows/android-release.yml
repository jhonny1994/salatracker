name: Android Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        type: string

jobs:
  validate-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets are present
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENV: ${{ secrets.SENTRY_ENV }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"  || (echo "Missing ANDROID_KEYSTORE_BASE64"  && exit 1)
          test -n "$ANDROID_KEYSTORE_PASSWORD" || (echo "Missing ANDROID_KEYSTORE_PASSWORD" && exit 1)
          test -n "$ANDROID_KEY_PASSWORD"      || (echo "Missing ANDROID_KEY_PASSWORD"      && exit 1)
          test -n "$ANDROID_KEY_ALIAS"         || (echo "Missing ANDROID_KEY_ALIAS"         && exit 1)
          test -n "$SENTRY_DSN"                || (echo "Missing SENTRY_DSN"                && exit 1)
          test -n "$SENTRY_ENV"                || (echo "Missing SENTRY_ENV"                && exit 1)
          echo "All required secrets are present."

  build-release-artifacts:
    runs-on: ubuntu-latest
    needs: validate-secrets
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localization
        run: dart run intl_utils:generate

      - name: Cache build_runner outputs
        uses: actions/cache@v4
        with:
          path: .dart_tool/build
          key: ${{ runner.os }}-build-runner-${{ hashFiles('pubspec.yaml', 'lib/**', 'test/**') }}
          restore-keys: |
            ${{ runner.os }}-build-runner-

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Decode and place keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

      - name: Write key.properties
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          cat > android/key.properties << EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Build signed APK (sideload flavor)
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENV: ${{ secrets.SENTRY_ENV }}
        run: flutter build apk --flavor sideload --release --dart-define=SENTRY_DSN=$SENTRY_DSN --dart-define=SENTRY_ENV=$SENTRY_ENV

      - name: Verify Play manifest does not request package installs
        run: |
          if grep -R "REQUEST_INSTALL_PACKAGES" android/app/src/main/AndroidManifest.xml android/app/src/play/AndroidManifest.xml 2>/dev/null; then
            echo "Play manifest scope contains REQUEST_INSTALL_PACKAGES"
            exit 1
          fi

      - name: Build signed AAB (play flavor)
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENV: ${{ secrets.SENTRY_ENV }}
        run: flutter build appbundle --flavor play --release --dart-define=SENTRY_DSN=$SENTRY_DSN --dart-define=SENTRY_ENV=$SENTRY_ENV

      - name: Compute APK SHA256
        run: sha256sum build/app/outputs/flutter-apk/app-sideload-release.apk | awk '{print $1}' > artifacts_apk_sha256.txt

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-sideload-release.apk
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/playRelease/app-play-release.aab
          retention-days: 30

      - name: Upload APK SHA artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-sha256
          path: artifacts_apk_sha256.txt
          retention-days: 30

  create-github-release:
    runs-on: ubuntu-latest
    needs: build-release-artifacts
    permissions:
      contents: write
    steps:
      - name: Checkout repository files
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/apk

      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: android-aab
          path: artifacts/aab

      - name: Download APK SHA artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk-sha256
          path: artifacts/sha

      - name: Generate update manifest from release artifacts
        run: |
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          pubspec = Path('pubspec.yaml').read_text(encoding='utf-8')
          match = re.search(r'^version:\s+\d+\.\d+\.\d+\+(\d+)$', pubspec, re.MULTILINE)
          if not match:
              raise SystemExit('Unable to extract version code from pubspec.yaml')

          path = Path('update-manifest.json')
          manifest = json.loads(path.read_text(encoding='utf-8'))
          version_code = int(match.group(1))
          apk_sha = Path('artifacts/sha/artifacts_apk_sha256.txt').read_text(encoding='utf-8').strip()
          apk_url = f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/releases/latest/download/app-sideload-release.apk"
          release_url = f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/releases/latest"

          manifest['latest_version_code'] = version_code
          manifest['recommended_version_code'] = version_code
          manifest['apk_url'] = apk_url
          manifest['release_notes_url'] = release_url
          manifest['sha256'] = apk_sha

          path.write_text(json.dumps(manifest, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Validate generated update manifest
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          pubspec = Path('pubspec.yaml').read_text(encoding='utf-8')
          match = re.search(r'^version:\s+\d+\.\d+\.\d+\+(\d+)$', pubspec, re.MULTILINE)
          if not match:
              raise SystemExit('Unable to extract version code from pubspec.yaml')

          manifest = json.loads(Path('update-manifest.json').read_text(encoding='utf-8'))
          expected_name = 'app-sideload-release.apk'
          apk_url = manifest['apk_url']
          sha = manifest['sha256']
          expected_version = int(match.group(1))

          if not apk_url.endswith('/' + expected_name):
              raise SystemExit(f'update-manifest apk_url must end with {expected_name}: {apk_url}')

          if len(sha) != 64:
              raise SystemExit('update-manifest sha256 must be a 64-char hex digest')

          if manifest['latest_version_code'] != expected_version:
              raise SystemExit('update-manifest latest_version_code must match pubspec build number')

          if manifest['recommended_version_code'] != expected_version:
              raise SystemExit('update-manifest recommended_version_code must match pubspec build number')

          PY

      - name: Create GitHub release with auto-generated notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          generate_release_notes: true
          files: |
            artifacts/apk/app-sideload-release.apk
            artifacts/aab/app-play-release.aab
            artifacts/sha/artifacts_apk_sha256.txt

      - name: Verify published sideload APK URL
        run: |
          curl --fail --silent --show-error --location --head \
            "https://github.com/${{ github.repository }}/releases/latest/download/app-sideload-release.apk"

      - name: Prepare Pages artifact
        run: |
          mkdir -p pages
          cp update-manifest.json pages/update-manifest.json

      - name: Upload update manifest Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy-update-manifest:
    runs-on: ubuntu-latest
    needs: create-github-release
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4

  verify-update-manifest:
    runs-on: ubuntu-latest
    needs: deploy-update-manifest
    steps:
      - name: Verify published manifest URL
        run: |
          curl --fail --silent --show-error --location \
            --retry 6 --retry-delay 10 --retry-all-errors \
            "https://jhonny1994.github.io/salatracker/update-manifest.json" >/dev/null
